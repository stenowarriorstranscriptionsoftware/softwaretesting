<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Stats - Steno Warriors</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
</head>
<body>
  <div class="header">
    <h1>📈 My Stats Dashboard</h1>
    <div id="user-info"></div>
  </div>

  <div class="main">
    <h2>Your Performance Trends</h2>
    <canvas id="lineChart" height="100"></canvas>

    <h2 style="margin-top: 2rem;">Error Type Breakdown</h2>
    <canvas id="pieChart" height="100"></canvas>

    <h2 style="margin-top: 2rem;">Your Recent Attempts</h2>
    <table style="width: 100%; margin-top: 1rem;">
      <thead>
        <tr>
          <th>Date</th>
          <th>Test</th>
          <th>Speed</th>
          <th>Accuracy</th>
          <th>Words</th>
          <th>Time</th>
          <th>Feedback</th>
        </tr>
      </thead>
      <tbody id="attempts-table-body"></tbody>
    </table>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD71idTIXlQt0TIjICLg2BL6dhfi7e6IXI",
      authDomain: "stenowarriorskc.firebaseapp.com",
      projectId: "stenowarriorskc",
      databaseURL: "https://stenowarriorskc-default-rtdb.firebaseio.com",
      appId: "1:923880455930:web:4cc708da4c0641b79b5343"
    };

    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.database();

    function generateFeedback(entry) {
      if (entry.accuracy > 95) return "Excellent accuracy! Keep it up!";
      if (entry.accuracy > 85) return "Good job! Focus on small improvements.";
      if (entry.accuracy > 70) return "Work on reducing omissions and spelling.";
      return "Keep practicing—accuracy will improve with time!";
    }

    function renderCharts(data) {
      const labels = data.map(d => new Date(d.timestamp).toLocaleDateString());
      const speedData = data.map(d => d.speed);
      const accuracyData = data.map(d => d.accuracy);
      const pieData = { additions: 0, omissions: 0, spelling: 0 };

      data.forEach(d => {
        if (d.errors) {
          pieData.additions += d.errors.add || 0;
          pieData.omissions += d.errors.omit || 0;
          pieData.spelling += d.errors.spell || 0;
        }
      });

      new Chart(document.getElementById("lineChart"), {
        type: "line",
        data: {
          labels: labels,
          datasets: [
            { label: "Speed (WPM)", data: speedData, borderColor: "#4361ee", fill: false },
            { label: "Accuracy (%)", data: accuracyData, borderColor: "#f8961e", fill: false }
          ]
        }
      });

      new Chart(document.getElementById("pieChart"), {
        type: "pie",
        data: {
          labels: ["Additions", "Omissions", "Spelling"],
          datasets: [{
            data: [pieData.additions, pieData.omissions, pieData.spelling],
            backgroundColor: ["#f72585", "#4895ef", "#4cc9f0"]
          }]
        }
      });
    }

    function renderTable(data) {
      const tableBody = document.getElementById("attempts-table-body");
      tableBody.innerHTML = "";

      data.reverse().forEach(entry => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${new Date(entry.timestamp).toLocaleString()}</td>
          <td>${entry.testNumber}</td>
          <td>${entry.speed} WPM</td>
          <td>${entry.accuracy}%</td>
          <td>${entry.typedWords}/${entry.totalWords}</td>
          <td>${Math.round(entry.timeTaken / 60)} min</td>
          <td>${generateFeedback(entry)}</td>
        `;
        tableBody.appendChild(row);
      });
    }

    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById("user-info").innerText = "Logged in as: " + user.displayName;
        db.ref("leaderboard").orderByChild("userId").equalTo(user.uid).once("value", snapshot => {
          const userData = [];
          snapshot.forEach(child => userData.push(child.val()));
          renderCharts(userData);
          renderTable(userData);
        });
      } else {
        window.location.href = "index.html";
      }
    });
  </script>
</body>
</html>
